<html lang="hi">
<head>
<meta charset="UTF-8">

<title>किसान मित्र — Kisan Mitra</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --saffron:     #e8560a;
    --saffron-mid: #f07030;
    --green:       #1e7c3a;
    --green-mid:   #28a04a;
    --earth:       #7a4e28;
    --white:       #ffffff;
    --page-bg:     #f6f4f0;
    --text-dark:   #1a1208;
    --text-mid:    #5a4a30;
    --text-light:  #9a8a70;
    --border:      #e8e0d0;
  }

  body {
    min-height: 100vh;
    background: var(--page-bg);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, #e8560a0a 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, #1e7c3a0a 0%, transparent 50%);
    pointer-events: none;
  }

  .page { width: 100%; max-width: 420px; position: relative; }

  /* ── LOGO SECTION ── */
  .logo-section {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-illustration {
    width: 130px;
    height: 130px;
    margin: 0 auto 20px;
  }

  .slogan {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 13px;
    color: var(--saffron);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .title-hi {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 42px;
    color: var(--text-dark);
    line-height: 1.1;
    letter-spacing: 0.5px;
  }

  .title-en {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-light);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .tagline {
    margin-top: 12px;
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.6;
  }

  /* ── LANGUAGE SECTION ── */
  .lang-section {
    animation: fadeUp 0.6s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .lang-label {
    text-align: center;
    font-size: 12px;
    font-weight: 800;
    color: var(--text-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .lang-label::before, .lang-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .lang-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .lang-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 22px;
    border-radius: 18px;
    text-decoration: none;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    border: 2px solid transparent;
  }

  .lang-btn:hover { transform: translateY(-2px); }
  .lang-btn:active { transform: scale(0.98); }

  .btn-hi {
    background: var(--saffron);
    box-shadow: 0 4px 20px #e8560a30;
  }

  .btn-hi:hover { box-shadow: 0 8px 28px #e8560a40; }

  .btn-en {
    background: var(--white);
    border-color: var(--border);
    box-shadow: 0 2px 12px #0000000a;
  }

  .btn-en:hover { border-color: #c8b890; box-shadow: 0 6px 20px #00000012; }

  .btn-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 24px;
    line-height: 1;
  }

  .btn-hi .btn-icon { background: #ffffff20; }
  .btn-en .btn-icon { background: #f6f4f0; }

  .btn-text { flex: 1; }

  .btn-main-hi { font-family: 'Tiro Devanagari Hindi', serif; }
  .btn-hi .btn-main-hi { font-size: 26px; color: white; line-height: 1.1; }
  .btn-en .btn-main-hi { font-size: 26px; color: var(--text-dark); line-height: 1.1; }

  .btn-sub {
    font-size: 12px;
    font-weight: 700;
    margin-top: 3px;
    display: block;
  }

  .btn-hi .btn-sub { color: #ffccaa; }
  .btn-en .btn-sub { color: var(--text-light); }

  .btn-arrow {
    font-size: 22px;
    transition: transform 0.2s;
  }

  .btn-hi .btn-arrow { color: #ffccaa; }
  .btn-en .btn-arrow { color: var(--border); }
  .lang-btn:hover .btn-arrow { transform: translateX(4px); }

  /* ── FOOTER ── */
  .footer {
    margin-top: 32px;
    text-align: center;
    font-size: 11px;
    color: var(--text-light);
    font-weight: 600;
    letter-spacing: 0.5px;
    animation: fadeUp 0.6s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

</style>
</head>
